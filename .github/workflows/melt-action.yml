name: Melt-Chan Interactive Bot
on:
  issues:
    types: [opened]

jobs:
  interact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Process Interaction
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          USER_LOGIN: ${{ github.event.issue.user.login }}
        run: |
          python -c '
          import json, os
          
          title = os.environ.get("ISSUE_TITLE", "")
          user = os.environ.get("USER_LOGIN", "")
          
          if "Melt-Chan-Feed" in title or "Melt-Chan-Roast" in title:
              with open("bot_state.json", "r") as f:
                  state = json.load(f)
                  
              state["last_interactor"] = user
              
              if "Cookie" in title:
                  state["cookies"] += 1
              elif "Roast" in title:
                  state["roasts"] += 1
                  
              with open("bot_state.json", "w") as f:
                  json.dump(state, f, indent=2)
          '

      - name: Commit and Push State Update
        run: |
          git config --global user.name "melt-chan[bot]"
          git config --global user.email "melt-chan@users.noreply.github.com"
          git add bot_state.json
          git commit -m "Update Melt-Chan state by @${{ github.event.issue.user.login }}" || echo "No changes to commit"
          git push

      - name: Comment and Close Issue
        uses: actions/github-script@v6
        with:
          script: |
            const title = context.payload.issue.title;
            let message = `Melt-Chan is confused...`;
            
            if (title.includes('Cookie')) {
              message = `Om nom nom! 🍪 Thanks for the cookie, @${context.payload.issue.user.login}! My stats are updated on Advik's profile.`;
            } else if (title.includes('Roast')) {
              message = `🔥 Ouch! Melt-Chan felt that roast, @${context.payload.issue.user.login}. Advik will hear about this.`;
            }
            
            // Post the comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
            
            // Close the issue
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });